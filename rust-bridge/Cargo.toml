[package]
name = "rust-bridge"
version = "0.1.0"
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
fishsense = { git = "https://github.com/UCSD-E4E/fishsense.rs.git", version = "0.1.0" }
libc = "0.2.155"
ndarray = "0.15.6"
opencv = { version = "0.91.3", features = ["clang-runtime"]}
cv-convert = { git = "https://github.com/ccrutchf/rust-cv-convert.git", version = "0.25.0", default-features = false, features = ["opencv_0-91", "ndarray_0-15"] }

[lib]
name = "fishsense"
crate-type = ["staticlib"]
