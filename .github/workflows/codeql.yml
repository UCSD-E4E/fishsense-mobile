name: "CodeQL Advanced"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '16 2 * * 1'

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ${{ (matrix.language == 'swift' && 'macos-15') || 'ubuntu-latest' }}
    timeout-minutes: 120
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
        - language: actions
          build-mode: none
        - language: ruby
          build-mode: none
        - language: rust
          build-mode: none
        - language: swift
          build-mode: manual

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: 🛠️ Select Xcode
      if: matrix.language == 'swift'
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable

    - name: 🐍 Set up Python
      if: matrix.language == 'swift'
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: 🦋 Setup Flutter
      if: matrix.language == 'swift'
      uses: subosito/flutter-action@v2
      with:
        channel: stable

    - name: 📦 Cache Flutter pub packages
      if: matrix.language == 'swift'
      uses: actions/cache@v4
      with:
        path: ~/.pub-cache
        key: ${{ runner.os }}-pub-${{ hashFiles('pubspec.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pub-

    - name: 📥 Get dependencies
      if: matrix.language == 'swift'
      run: flutter pub get

    - name: 📦 Cache Cargo registry
      if: matrix.language == 'swift'
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          rust-bridge/target
        key: ${{ runner.os }}-cargo-${{ hashFiles('rust-bridge/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-

    - name: 🧱 Build Rust Bridge
      if: matrix.language == 'swift'
      run: |
        python -m pip install --upgrade pip uv
        cd rust-bridge
        make

    - name: 📱 Configure iOS App
      if: matrix.language == 'swift'
      run: |
        BUNDLE_IDENTIFIER="${APP_IDENTIFIER:-com.aqua3d.fishsense}"
        echo "PERSONAL_DEVELOPMENT_TEAM =" > ios/Flutter/DeveloperSettings.xcconfig
        echo "FISHSENSE_BUNDLE_IDENTIFIER = ${BUNDLE_IDENTIFIER}" >> ios/Flutter/DeveloperSettings.xcconfig

    - name: 📦 Cache CocoaPods
      if: matrix.language == 'swift'
      uses: actions/cache@v4
      with:
        path: ios/Pods
        key: ${{ runner.os }}-pods-${{ hashFiles('ios/Podfile.lock') }}
        restore-keys: |
          ${{ runner.os }}-pods-

    - name: 📦 Install CocoaPods
      if: matrix.language == 'swift'
      run: |
        cd ios
        pod install

    - name: 🔎 Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: ${{ matrix.language }}
        build-mode: ${{ matrix.build-mode }}

    - name: 🏗️ Build iOS for CodeQL
      if: matrix.language == 'swift'
      run: |
        xcodebuild clean build \
          -workspace ios/Runner.xcworkspace \
          -scheme Runner \
          -destination 'generic/platform=iOS' \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          SWIFT_USE_INTEGRATED_DRIVER=NO \
          COMPILER_INDEX_STORE_ENABLE=NO

    - name: 🧪 Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
      with:
        category: "/language:${{ matrix.language }}"
