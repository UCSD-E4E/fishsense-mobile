name: Build

on: [push]

jobs:
  build:
    runs-on: macos-latest
    env:
      FASTLANE_TEAM_ID: ${{ secrets.FASTLANE_TEAM_ID }}

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: 🐍 Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: 🦋 Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: stable

    - name: 📥 Get dependencies
      run: flutter pub get

    - name: 🧱 Build Dependencies
      run: |
        python -m pip install --upgrade pip uv
        cd rust-bridge
        make

    - name: 📱 Build iOS App
      run: |
        if [ -z "${FASTLANE_TEAM_ID}" ]; then
          echo "FASTLANE_TEAM_ID is not set. Add it as a repository secret to enable iOS signing in CI."
          exit 1
        fi
        echo "PERSONAL_DEVELOPMENT_TEAM = ${FASTLANE_TEAM_ID}" > ios/Flutter/DeveloperSettings.xcconfig
        echo "FISHSENSE_BUNDLE_IDENTIFIER = com.aqua3d.fishsense" >> ios/Flutter/DeveloperSettings.xcconfig
        flutter build ios --release --no-codesign
        
    - name: 🚀 Publish to TestFlight
      run: |
        cd ios
        bundle install
        bundle exec fastlane beta